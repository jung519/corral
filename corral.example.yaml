# Corral configuration example. Copy to corral.yaml and edit.
# Secrets are NOT stored here — set them as environment variables (BYOK):
#   CORRAL_NOTION_DEFAULT     — Notion integration token
#   CORRAL_GITHUB_DEFAULT     — GitHub access token
#   CORRAL_ANTHROPIC_DEFAULT  — Anthropic API key
# (the var name is CORRAL_<SERVICE>_<ACCOUNT>, uppercased.)

profile:
  language: en          # output language for agent-authored plans/reviews
  stack: generic        # review calibration profile
  # reference_repo: acme/conventions

tracker:
  kind: notion
  database_id: "your_notion_database_id"
  credential: { service: notion, account: default }
  properties:
    status: "Status"
    identifier: "ID"
    repo: "Repo"
  states:
    planning: "Backlog"
    plan_review: "Plan review"
    in_progress: "In progress"
    in_review: "In review"
    done: "Done"
  scope:
    type: checkbox       # only issues with this checkbox are picked up
    property: "Corral"

repositories:
  - kind: github
    key: main
    repo: acme/widgets
    credential: { service: github, account: default }
    branch_strategy:
      production: main
      development: develop
    verify:
      - "npm run lint"
      - "npm run typecheck"
    after_clone: "npm ci"

agent:
  provider: claude        # claude | gemini | gpt
  transport: cli          # cli (spawns your installed CLI; implemented) | api (stub)
  credential: { service: anthropic, account: default }  # API key injected as ANTHROPIC_API_KEY (BYOK)
  models:
    planning: opus
    implementation: sonnet

workspace:
  backend: local          # local | docker

channel:
  kind: web               # web | slack
  port: 4400
