name: Deploy site (corralhq.dev)

# Publishes the static site/ folder to GitHub Pages → served at corralhq.dev:
#   - version.json  the update gate's manifest (kill switch: raise minSupported to force)
#   - index.html    the landing page
#   - CNAME         binds the custom domain
# Redeploys only when site/ changes. One-time setup (DNS + enabling Pages) is in docs/hosting.md.

on:
  push:
    branches: [main]
    paths: ['site/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
