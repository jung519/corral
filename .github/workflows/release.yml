name: Release

# Push a version tag → build installers on each OS → attach them to a DRAFT GitHub Release.
# A manual run (workflow_dispatch) builds only, so you can verify CI without cutting a release.
#
#   pnpm version:set 0.2.0 && git commit -am "release: v0.2.0" && git tag v0.2.0 && git push --follow-tags
#
# Installers are UNSIGNED until the signing milestone — macOS Gatekeeper / Windows SmartScreen
# will warn. The release is a DRAFT: review, add notes, then publish it manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed for GITHUB_TOKEN to create/upload the Release

jobs:
  build:
    strategy:
      # Serial, not parallel: both runners publish to the SAME draft release; running one at a
      # time avoids a race where both try to create it. fail-fast off so one OS failing still
      # lets the other finish.
      max-parallel: 1
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from the root packageManager field

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            renderer/pnpm-lock.yaml
            desktop/pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm -C renderer install --frozen-lockfile
          pnpm -C desktop install --frozen-lockfile

      - name: Build core + renderer + desktop
        shell: bash
        run: pnpm build:all

      - name: Package installers (+ publish draft on a tag)
        shell: bash
        run: pnpm -C desktop run dist -- --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing is wired but SAFE-WHEN-EMPTY: with no secrets set, every value below is
          # '' / false → electron-builder skips signing and builds unsigned exactly as before.
          # Add the secrets (see docs/signing.md) and the same builds sign automatically.
          #
          # macOS — Developer ID cert (.p12 → base64) + Apple notary creds. Notarization is
          # env-driven (no config): electron-builder notarizes when APPLE_* are set, and
          # skips silently when they aren't. The Apple creds are gated on the CERT being
          # present too — notarizing an unsigned app would FAIL, so it's all-or-nothing.
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK != '' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK != '' && secrets.APPLE_TEAM_ID || '' }}
          # Windows — code-signing cert (.pfx → base64).
          WIN_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          # Search the keychain for an identity ONLY when a mac cert was actually provided;
          # otherwise stay unsigned (a stray identity in CI would make signing fail).
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && secrets.MAC_CSC_LINK != '' }}

      - name: Upload installers as workflow artifacts (backup / manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: corral-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.yml
          if-no-files-found: warn
