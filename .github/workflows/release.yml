name: Release

# Push a version tag → build installers on each OS → attach them to a DRAFT GitHub Release.
# A manual run (workflow_dispatch) builds only, so you can verify CI without cutting a release.
#
#   pnpm version:set 0.2.0 && git commit -am "release: v0.2.0" && git tag v0.2.0 && git push --follow-tags
#
# Installers are UNSIGNED until the signing milestone — macOS Gatekeeper / Windows SmartScreen
# will warn. The release is a DRAFT: review, add notes, then publish it manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # needed for GITHUB_TOKEN to create/upload the Release

jobs:
  build:
    strategy:
      # Serial, not parallel: both runners publish to the SAME draft release; running one at a
      # time avoids a race where both try to create it. fail-fast off so one OS failing still
      # lets the other finish.
      max-parallel: 1
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version comes from the root packageManager field

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            renderer/pnpm-lock.yaml
            desktop/pnpm-lock.yaml

      - name: Install dependencies
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm -C renderer install --frozen-lockfile
          pnpm -C desktop install --frozen-lockfile

      - name: Build core + renderer + desktop
        shell: bash
        run: pnpm build:all

      - name: Package installers (+ publish draft on a tag)
        shell: bash
        # ⚠️ CSC_LINK must be UNSET (never '') when there's no cert — electron-builder tries
        # to load an empty CSC_LINK as a file path and dies ("<cwd> not a file"). So the cert
        # vars are EXPORTED conditionally here rather than declared (as '') in `env:`. The
        # secrets are mapped to intermediate vars (masked); empty is safe for those.
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            if [ -n "$SECRET_MAC_CSC_LINK" ]; then
              export CSC_LINK="$SECRET_MAC_CSC_LINK" CSC_KEY_PASSWORD="$SECRET_MAC_CSC_KEY_PASSWORD"
              # Notary creds (env-driven; electron-builder notarizes when these are set). Gated
              # on the cert being present — notarizing an unsigned app would fail.
              export APPLE_ID="$SECRET_APPLE_ID" APPLE_APP_SPECIFIC_PASSWORD="$SECRET_APPLE_APP_SPECIFIC_PASSWORD" APPLE_TEAM_ID="$SECRET_APPLE_TEAM_ID"
            else
              export CSC_IDENTITY_AUTO_DISCOVERY=false   # unsigned: don't probe the keychain
            fi
          elif [ "$RUNNER_OS" = "Windows" ]; then
            if [ -n "$SECRET_WIN_CSC_LINK" ]; then
              export CSC_LINK="$SECRET_WIN_CSC_LINK" CSC_KEY_PASSWORD="$SECRET_WIN_CSC_KEY_PASSWORD"
            fi
          fi
          pnpm -C desktop exec electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing is SAFE-WHEN-EMPTY: with no secrets, no CSC_LINK is exported above →
          # electron-builder builds unsigned. Add the secrets (docs/signing.md) → auto-signs.
          SECRET_MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          SECRET_MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          SECRET_APPLE_ID: ${{ secrets.APPLE_ID }}
          SECRET_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SECRET_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          SECRET_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload installers as workflow artifacts (backup / manual runs)
        uses: actions/upload-artifact@v4
        with:
          name: corral-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
            desktop/release/*.yml
          if-no-files-found: warn
